<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Live Map Clock</title>
    
    <!-- Leaflet (地図ライブラリ) の読み込み -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #000;
        }
        /* 地図を画面いっぱいに表示 */
        #map {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* 地図の上に重ねる時計のレイヤー */
        #clock-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-family: sans-serif;
            font-size: 24px;
            font-weight: bold;
            z-index: 10; /* 地図より上に表示 */
            pointer-events: none; /* 時計が地図の操作を邪魔しないようにする */
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="clock-overlay">00:00:00</div>
    <div id="map"></div>

    <script>
        // 1. 時計の処理
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock-overlay').textContent = `${hours}:${minutes}:${seconds}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. 地図の初期化 (初期位置は東京駅付近にしておきます)
        const map = L.map('map').setView([35.6812, 139.7671], 14);

        // OpenStreetMapのタイル（画像）レイヤーを追加
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        // 現在地を示すマーカー
        let currentMarker = null;

        // 3. iPhoneのGPSから現在地を取得して地図を移動させる関数
        function updateLocation() {
            if (!navigator.geolocation) {
                alert("お使いのブラウザは位置情報をサポートしていません");
                return;
            }

            // 高精度で位置情報を追跡する
            navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;

                    // 地図の中心を現在地にする
                    map.setView([lat, lng], 15);

                    // 既存のマーカーがあれば削除して、新しい位置に置き直す
                    if (currentMarker) {
                        map.removeLayer(currentMarker);
                    }
                    currentMarker = L.marker([lat, lng]).addTo(map)
                        .bindPopup("ここにいます")
                        .openPopup();
                },
                (error) => {
                    console.error("位置情報の取得に失敗しました:", error);
                },
                {
                    enableHighAccuracy: true, // 高精度GPSを使用
                    timeout: 5000,
                    maximumAge: 0
                }
            );
        }

        // 地図が読み込まれたら位置情報の追跡を開始
        updateLocation();
    </script>
</body>
</html>
