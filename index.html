<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Clock</title>
    
    <!-- 1. Google Fonts から、世界中で使われている超おしゃれなフォント「Inter」の極細(100)と細め(200)を読み込む -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #1a1a1a; 
            /* 2. 読み込んだフォントを全体のデフォルトにする */
            font-family: 'Inter', sans-serif;
            transition: background-color 2.0s ease-in-out;
        }
        
        #clock-container {
            height: 100%;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #time {
            font-size: 22vw;
            /* 3. ここで極細(100)を指定。Google FontsなのでiPhoneでも確実にこの細さになります */
            font-weight: 100; 
            color: #ffffff;
            line-height: 0.9;
            letter-spacing: -0.04em;
        }

        #date {
            font-size: 3.5vw;
            color: #ffffff;
            opacity: 0.5;
            margin-top: 25px;
            letter-spacing: 0.15em;
            /* 日付は少しだけ太く(200)してバランスを取る */
            font-weight: 200;
        }
    </style>
</head>
<body>

    <div id="clock-container">
        <div id="time">00:00</div>
        <div id="date">2026.05.17 SUN</div>
    </div>

    <script>
        // --- 時計のリアルタイム表示処理 ---
        const timeElement = document.getElementById('time');
        const dateElement = document.getElementById('date');

        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            timeElement.textContent = `${hours}:${minutes}`;

            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const date = String(now.getDate()).padStart(2, '0');
            const dayList = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            dateElement.textContent = `${year}.${month}.${date} ${dayList[now.getDay()]}`;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 背景カラーを時々変える処理 ---
        const colors = [
            '#1a1a1a', '#2c3e50', '#2e3d30', '#3a2a35', '#232b2b', '#34495e'
        ];
        let colorIndex = 0;
        function changeBackgroundColor() {
            document.body.style.backgroundColor = colors[colorIndex];
            colorIndex = (colorIndex + 1) % colors.length;
        }
        setInterval(changeBackgroundColor, 300000); // 5分ごと
        changeBackgroundColor();
    </script>
</body>
</html>
